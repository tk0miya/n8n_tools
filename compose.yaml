services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_TOKEN}
    depends_on:
      - n8n

  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: always
    ports:
     - "5678:5678"
    environment:
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_HOST=${SUBDOMAIN}.${DOMAIN_NAME}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_RUNNERS_ENABLED=true
      - NODE_ENV=production
      - NODES_EXCLUDE=[]
      - WEBHOOK_URL=https://${SUBDOMAIN}.${DOMAIN_NAME}/
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - TZ=${GENERIC_TIMEZONE}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./local-files:/files

  orchestrator:
    image: alpine:3
    restart: unless-stopped
    # apk add runs at each start; takes a few seconds but keeps the image upstream-only.
    command: >
      sh -c "apk add --no-cache docker-cli jq &&
             chmod +x /www/cgi-bin/run.sh &&
             busybox httpd -f -p 8080 -h /www"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./local-files:/files:ro
      - ./local-files/n8n_tools/orchestrator/cgi-bin/run.sh:/www/cgi-bin/run.sh:ro
    environment:
      - N8N_TOOLS_PATH=${PWD}/local-files/n8n_tools

volumes:
  n8n_data:
